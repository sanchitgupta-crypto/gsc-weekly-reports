name: GSC Monthly Report

on:
  schedule:
    # First Monday of each month at 01:00 UTC = 6:30 AM IST
    - cron: '0 1 1-7 * 1'
  
  workflow_dispatch:

jobs:
  send-report:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write credentials file
        run: echo '${{ secrets.GSC_CREDENTIALS_JSON }}' > credentials.json

      - name: Run monthly report
        env:
          GSC_SITE_URL: "sc-domain:squadstack.ai"
          GSC_CREDENTIALS: "credentials.json"
          SMTP_HOST: "smtp.gmail.com"
          SMTP_PORT: "587"
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          REPORT_RECIPIENTS: ${{ secrets.REPORT_RECIPIENTS }}
        run: python gsc_weekly_report.py --monthly

      - name: Clean up credentials
        if: always()
        run: rm -f credentials.json
